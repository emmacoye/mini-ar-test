<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MindAR Image Tracking — Mini Test</title>
  <!--
    mind-ar@1.2.x publishes mindar-image-three.prod.js as ES modules only (Vite lib format "es").
    A classic <script src="..."> hits "Cannot use import statement outside a module".
    The supported setup matches upstream docs: import map + one application <script type="module">.
    The MindAR URL below is exactly: https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js
    Three is not a second UMD script; the bare specifier "three" is resolved here (peer dependency of MindAR 1.2).
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body { background: #111; color: #fff; font-family: sans-serif; }

    canvas, video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }

    #overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
      text-align: center; padding: 24px;
    }
    #overlay h1  { font-size: 1.5rem; margin-bottom: 12px; color: #FF4400; }
    #overlay p   { font-size: 0.92rem; color: #ccc; line-height: 1.6; max-width: 320px; }
    #overlay code { background: #333; padding: 2px 6px; border-radius: 4px; }
    #overlay button {
      margin-top: 28px; padding: 14px 36px;
      background: #FF4400; color: #fff; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    #overlay button:hover:not(:disabled) { background: #e03a00; }
    #overlay button:disabled { opacity: 0.6; cursor: not-allowed; }

    #status {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200; background: rgba(0,0,0,0.65);
      color: #fff; padding: 8px 18px; border-radius: 20px;
      font-size: 0.82rem; pointer-events: none;
      transition: opacity 0.4s;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1>🛩 AR Image Tracking Test</h1>
    <p>
      This is a mini test for <strong>MindAR.js</strong> image tracking.<br><br>
      Point your camera at the <strong>target image</strong>
      (<code>target-image.png</code>).<br><br>
      A spinning 3D box will appear on top of it once detected.
    </p>
    <button id="start-ar-btn" type="button" disabled onclick="startAR()">Loading AR engine…</button>
  </div>

  <div id="status" class="hidden">🔍 Searching for target…</div>

  <script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';

    window.THREE = THREE;
    window.MINDAR = window.MINDAR || {};
    window.MINDAR.IMAGE = Object.assign({}, window.MINDAR.IMAGE, { MindARThree });

    async function startAR() {
      document.getElementById('overlay').style.display = 'none';

      const mindarThree = new MindARThree({
        container: document.body,
        imageTargetSrc: './targets.mind',
        maxTrack: 1,
        uiLoading: 'yes',
        uiScanning: 'yes',
        uiError: 'yes',
      });

      const { renderer, scene, camera } = mindarThree;

      const ambient = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(2, 4, 3);
      scene.add(dirLight);

      const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
      const material = new THREE.MeshStandardMaterial({
        color: 0xFF4400,
        roughness: 0.4,
        metalness: 0.4,
      });
      const box = new THREE.Mesh(geometry, material);
      box.position.set(0, 0, 0.25);

      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(box);

      const statusEl = document.getElementById('status');

      anchor.onTargetFound = () => {
        statusEl.textContent = '✅ Target found!';
        statusEl.classList.remove('hidden');
        setTimeout(() => statusEl.classList.add('hidden'), 2500);
      };

      anchor.onTargetLost = () => {
        statusEl.textContent = '🔍 Searching for target…';
        statusEl.classList.remove('hidden');
      };

      const clock = new THREE.Clock();
      renderer.setAnimationLoop(() => {
        const t = clock.getElapsedTime();
        box.rotation.y = t * 1.2;
        box.rotation.x = Math.sin(t * 0.5) * 0.3;
        renderer.render(scene, camera);
      });

      await mindarThree.start();
    }

    window.startAR = startAR;
    const btn = document.getElementById('start-ar-btn');
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Start AR';
    }
  </script>
</body>
</html>
